<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accent Perception Experiment</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card: #ffffff;
    --ink: #1c2333;
    --muted: #6b7280;
    --accent: #4f6df5;
    --accent-dark: #3b56d4;
    --green: #2e9e6b;
    --red: #d95757;
    --border: #e3e6ec;
    --shadow: 0 8px 30px rgba(28, 35, 51, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    max-width: 680px;
    width: 100%;
    padding: 48px;
    text-align: center;
  }
  h1 { font-size: 1.6rem; margin-bottom: 18px; letter-spacing: -0.02em; }
  p.lead { font-size: 1.08rem; line-height: 1.65; color: var(--ink); margin-bottom: 14px; }
  p.sub { font-size: 0.95rem; line-height: 1.6; color: var(--muted); margin-bottom: 10px; }
  .notice {
    background: #eef1ff;
    border: 1px solid #d5dcff;
    border-radius: 12px;
    padding: 18px 22px;
    margin: 22px 0;
    font-size: 1.05rem;
    line-height: 1.6;
    color: #33406e;
  }
  input[type="text"] {
    width: 100%;
    max-width: 320px;
    padding: 11px 14px;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 6px 0 22px;
    outline: none;
    text-align: center;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  button {
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    padding: 14px 34px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: default; transform: none; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
  .btn-yes { background: var(--green); color: #fff; min-width: 150px; }
  .btn-no  { background: var(--red);   color: #fff; min-width: 150px; }
  .btn-yes:hover:not(:disabled), .btn-no:hover:not(:disabled) { filter: brightness(1.07); }

  /* progress */
  .progress-wrap { margin-bottom: 30px; }
  .progress-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .progress-track {
    height: 8px; background: var(--border); border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 99px; transition: width 0.35s ease;
  }

  /* clips */
  .clips { display: flex; gap: 20px; justify-content: center; margin: 30px 0; }
  .clip {
    flex: 1; max-width: 240px;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 26px 16px;
    transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
  }
  .clip .icon { font-size: 2rem; margin-bottom: 10px; }
  .clip .name { font-weight: 600; font-size: 1rem; }
  .clip .state { font-size: 0.82rem; color: var(--muted); margin-top: 6px; min-height: 1.1em; }
  .clip.playing {
    border-color: var(--accent);
    background: #eef1ff;
    box-shadow: 0 0 0 4px rgba(79, 109, 245, 0.14);
  }
  .clip.done { border-color: #c9d8cf; background: #f2f8f4; }
  .clip.playing .state { color: var(--accent); font-weight: 600; }
  .clip.done .state { color: var(--green); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .clip.playing .icon { animation: pulse 1.1s ease-in-out infinite; }

  .question { font-size: 1.25rem; font-weight: 600; margin: 8px 0 24px; line-height: 1.5; }
  .answers { display: flex; gap: 18px; justify-content: center; }
  .options { display: grid; grid-template-columns: repeat(2, minmax(120px, 180px)); gap: 14px; justify-content: center; margin-top: 8px; }
  .btn-option {
    background: var(--card);
    color: var(--ink);
    border: 2px solid var(--border);
    font-weight: 600;
  }
  .btn-option:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .check-feedback { min-height: 1.5em; font-size: 0.95rem; margin-top: 16px; font-weight: 600; }
  .fade { transition: opacity 0.25s ease; }
  .hidden-soft { opacity: 0; pointer-events: none; }
  .status-line { min-height: 1.4em; font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; }
  .footer-note { margin-top: 26px; font-size: 0.8rem; color: var(--muted); }

  /* demographics */
  .demo-block {
    text-align: left;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin: 14px 0;
  }
  .demo-block > p { font-weight: 600; margin-bottom: 10px; }
  .demo-block label {
    display: block;
    font-size: 0.98rem;
    line-height: 1.5;
    padding: 3px 0;
    cursor: pointer;
  }
  .demo-block input[type="radio"], .demo-block input[type="checkbox"] { margin-right: 8px; }
  .demo-block textarea {
    width: 100%;
    min-height: 70px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 0.95rem;
    margin-top: 8px;
    outline: none;
    resize: vertical;
  }
  .demo-block textarea:focus { border-color: var(--accent); }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card" id="screen"></div>

<script>
/* ============================================================
   CONFIG — the accent version of this experiment differs only
   in these values.
   ============================================================ */
const CONFIG = {
  experimentName: "accent_dialect",
  pageTitle: "Accent Perception Experiment",
  question: "Do the speakers in these clips have the same accent of English?",
  yesLabel: "Yes, same accent",
  noLabel: "No, different accents",
  /* Google Apps Script web-app URL (Deploy > New deployment > Web app).
     Each trial is POSTed here as it is answered. */
  saveUrl: "https://script.google.com/macros/s/AKfycbzkwTiTlPh5_-ta_ZimJlEx0eFLgJhodbxmELF6QJLAut5Iyqptfza8AWqh7-esTaD2/exec"
};

const AUDIO_BASE = "../analysis_files/sentence_extracts/all_files_normalized";

/* ============================================================
   STIMULI
   Each item = one model output: a timbre reference (speaker
   identity) + a style/source reference (accent) fed to the model.
   Only output files are model-generated; reference_* and source_*
   files are natural human recordings shared across both models.
   ============================================================ */
const ITEMS = {
  openvoice: [
    { group: "bottom5", timbre: "gujarati7__1504",  source: "english200__667" },
    { group: "bottom5", timbre: "gujarati8__1678",  source: "english200__667" },
    { group: "bottom5", timbre: "gujarati9__2041",  source: "english584__2197" },
    { group: "bottom5", timbre: "hindi12__1440",    source: "english200__667" },
    { group: "bottom5", timbre: "hindi7__867",      source: "english200__667" },
    { group: "top5",    timbre: "gujarati11__2301", source: "english584__2197" },
    { group: "top5",    timbre: "gujarati13__2409", source: "english200__667" },
    { group: "top5",    timbre: "gujarati17__2824", source: "english200__667" },
    { group: "top5",    timbre: "hindi13__1633",    source: "english200__667" },
    { group: "top5",    timbre: "hindi19__2206",    source: "english584__2197" }
  ],
  seed_vc: [
    { group: "bottom5", timbre: "gujarati4__610",   source: "english200__667" },
    { group: "bottom5", timbre: "hindi13__1633",    source: "english200__667" },
    { group: "bottom5", timbre: "hindi16__1966",    source: "english584__2197" },
    { group: "bottom5", timbre: "hindi21__2236",    source: "english584__2197" },
    { group: "bottom5", timbre: "hindi26__2354",    source: "english584__2197" },
    { group: "top5",    timbre: "gujarati16__2558", source: "english200__667" },
    { group: "top5",    timbre: "gujarati5__1016",  source: "english200__667" },
    { group: "top5",    timbre: "hindi10__1202",    source: "english200__667" },
    { group: "top5",    timbre: "hindi19__2206",    source: "english584__2197" },
    { group: "top5",    timbre: "hindi2__587",      source: "english584__2197" }
  ]
};

/* File-path builders. n = sentence number (1 or 2). */
function outputFile(model, item, n) {
  return `${AUDIO_BASE}/${model}_${item.group}_output_sentence${n}_timbre-${item.timbre}__source-${item.source}__${model}_s${n}.wav`;
}
function timbreRefFile(item, n) {
  return `${AUDIO_BASE}/reference_sentence${n}_${item.timbre}_s${n}.wav`;
}
function sourceRefFile(item, n) {
  return `${AUDIO_BASE}/source_sentence${n}_${item.source}_s${n}.wav`;
}

/* Conditions: first/second are canonical roles; which one actually plays
   first is randomized per trial (see randomizeOrder). The clip that plays
   first is always sentence 1, the second always sentence 2.
   sameSpeakerTruth = ground truth where it is defined independently of the
   model (NA when a model output is involved). */
const CONDITIONS = [
  { id: 1, name: "output_vs_timbreRef",    first: "output",    second: "timbreRef", sameSpeakerTruth: "NA" },
  { id: 2, name: "timbreRef_vs_timbreRef", first: "timbreRef", second: "timbreRef", sameSpeakerTruth: "same" },
  { id: 3, name: "timbreRef_vs_sourceRef", first: "timbreRef", second: "sourceRef", sameSpeakerTruth: "different" },
  { id: 4, name: "output_vs_sourceRef",    first: "output",    second: "sourceRef", sameSpeakerTruth: "NA" },
  { id: 5, name: "sourceRef_vs_sourceRef", first: "sourceRef", second: "sourceRef", sameSpeakerTruth: "same" }
];

function fileFor(role, model, item, n) {
  if (role === "output")    return outputFile(model, item, n);
  if (role === "timbreRef") return timbreRefFile(item, n);
  return sourceRefFile(item, n);
}

/* ============================================================
   EXPERIMENT STATE
   ============================================================ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const MODEL = Math.random() < 0.5 ? "openvoice" : "seed_vc";

/* Drop trials that would replay an identical pair of recordings. The
   same-speaker controls are generated once per item, so e.g.
   sourceRef_vs_sourceRef would repeat for every item sharing a source
   speaker (and timbreRef_vs_timbreRef would repeat if two items shared
   a timbre speaker). Each unique clip pair is heard only once. */
function dedupeTrials(trials) {
  const seen = new Set();
  return trials.filter(t => {
    const key = t.audio1 + "|" + t.audio2;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

/* Randomize which role plays first on each trial (coin flip), so
   presentation order is not confounded with condition. Applied after
   dedupe so the canonical pair key still catches duplicates. The clip
   that plays first is always sentence 1. The saved audio1/audio2
   filenames record the actual play order (audio1 always plays first). */
function randomizeOrder(trials) {
  return trials.map(t => {
    if (t.cond.first === t.cond.second || Math.random() < 0.5) return t;
    return Object.assign({}, t, {
      audio1: fileFor(t.cond.second, MODEL, t.item, 1),
      audio2: fileFor(t.cond.first, MODEL, t.item, 2)
    });
  });
}

const TRIALS = shuffle(randomizeOrder(dedupeTrials(
  ITEMS[MODEL].flatMap(item =>
    CONDITIONS.map(cond => ({
      model: MODEL,
      item,
      cond,
      audio1: fileFor(cond.first, MODEL, item, 1),
      audio2: fileFor(cond.second, MODEL, item, 2)
    }))
  )
)));

/* Practice: 3 random trials involving the assigned model's output audio.
   Responses are not recorded. */
const PRACTICE_TRIALS = shuffle(
  TRIALS.filter(t => t.cond.first === "output" || t.cond.second === "output")
).slice(0, 3);

let trialIndex = 0;
let practiceIndex = 0;
let participantId = "";
/* Unique per-session ID, generated regardless of the Prolific ID entered. */
const SESSION_ID = Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
const results = [];
const screen = document.getElementById("screen");

/* POST one trial row to the Google Apps Script endpoint. Fire-and-forget:
   Apps Script web apps don't send CORS headers, so we use no-cors and
   can't read the response. */
function saveTrial(row) {
  if (!CONFIG.saveUrl || CONFIG.saveUrl.startsWith("PASTE")) {
    console.warn("CONFIG.saveUrl not set — trial not saved:", row);
    return;
  }
  fetch(CONFIG.saveUrl, {
    method: "POST",
    mode: "no-cors",
    keepalive: true,
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams(row).toString()
  }).catch(err => console.warn("saveTrial failed:", err));
}

/* ============================================================
   SCREENS
   ============================================================ */
function showWelcome() {
  screen.innerHTML = `
    <h1>${CONFIG.pageTitle}</h1>
    <p class="lead">On each trial you will hear <strong>two short audio clips</strong>, one after the other. Each clip plays <strong>only once</strong>, so please listen carefully.</p>
    <p class="lead">After both clips finish, you will answer:<br><em>&ldquo;${CONFIG.question}&rdquo;</em></p>
    <p class="sub">There are ${TRIALS.length} trials. The experiment takes about 25 minutes. Please use headphones in a quiet environment.</p>
    <p class="sub" style="margin-top:20px;">Prolific ID:</p>
    <input type="text" id="pid" placeholder="Enter your Prolific ID" autocomplete="off">
    <div class="check-feedback" id="pidError" style="color: var(--red); margin-top: 0; margin-bottom: 14px;"></div>
    <button class="btn-primary" id="startBtn">Begin Experiment</button>
  `;
  document.getElementById("startBtn").addEventListener("click", () => {
    const pid = document.getElementById("pid").value.trim();
    if (!pid) {
      document.getElementById("pidError").textContent = "Please enter your Prolific ID.";
      return;
    }
    participantId = pid;
    showNotice();
  });
}

function showNotice() {
  screen.innerHTML = `
    <h1>Before you begin</h1>
    <div class="notice">
      <p>Your task is to judge whether the two clips in each trial share the <strong>same accent of English</strong>.</p>
      <p style="margin-top:14px;">Some of the speakers you hear are able to speak in more than one accent, so the two clips may come from the <strong>exact same person</strong> producing two different accents &mdash; for example, one clip in an Indian accent of English and the other with no distinct accent. Focus only on the accent itself, not on whether the clips seem to come from the same person.</p>
    </div>
    <button class="btn-primary" id="noticeBtn">Continue</button>
  `;
  document.getElementById("noticeBtn").addEventListener("click", showAccentNotice);
}

function showAccentNotice() {
  screen.innerHTML = `
    <h1>What is an accent?</h1>
    <div class="notice">
      <p>An <strong>accent</strong> is the way English is pronounced &mdash; how vowels and consonants are formed, along with the rhythm and intonation of speech &mdash; which often reflects where a speaker is from or what other languages they speak.</p>
      <p style="margin-top:14px;">For this study, simply listen for whether the two clips sound like they come from the <strong>same regional or language background</strong>. There are no right or wrong answers &mdash; just go with your impression.</p>
    </div>
    <button class="btn-primary" id="accentBtn">Continue</button>
  `;
  document.getElementById("accentBtn").addEventListener("click", showQualityNotice);
}

function showQualityNotice() {
  screen.innerHTML = `
    <h1>One more thing</h1>
    <div class="notice">
      <p>Please <strong>ignore differences in audio quality</strong>. The clips were recorded in different environments, so two clips may differ in loudness, background noise, echo, or overall recording quality &mdash; even when the accent is the same.</p>
      <p style="margin-top:14px;">Base your judgments only on the accent you hear, not on the recording conditions.</p>
    </div>
    <button class="btn-primary" id="qualityBtn">Continue</button>
  `;
  document.getElementById("qualityBtn").addEventListener("click", showAudioCheck);
}

/* ============================================================
   AUDIO CHECK — replayable clip for setting a comfortable volume,
   gated on a comprehension question ("bananas" -> yellow).
   ============================================================ */
const AUDIO_CHECK = {
  file: "audio_check/audio_check.wav",
  question: "What is the color of Tom's favorite fruit?",
  options: ["white", "black", "orange", "yellow"],
  correct: "yellow"
};

function showAudioCheck() {
  screen.innerHTML = `
    <h1>Audio Check</h1>
    <p class="lead">Listen carefully to this audio and <strong>adjust your volume to a comfortable level</strong>. Leave it there for the whole experiment.</p>
    <p class="sub">You can play the clip as many times as you like.</p>
    <button class="btn-primary" id="checkPlayBtn" style="margin: 18px 0 26px;">&#9654;&nbsp; Play Audio</button>
    <div class="question">${AUDIO_CHECK.question}</div>
    <div class="options">
      ${AUDIO_CHECK.options.map(o => `<button class="btn-option" data-answer="${o}">${o}</button>`).join("")}
    </div>
    <div class="check-feedback" id="checkFeedback"></div>
  `;

  const playBtn = document.getElementById("checkPlayBtn");
  const feedback = document.getElementById("checkFeedback");
  const checkAudio = new Audio(AUDIO_CHECK.file);
  checkAudio.preload = "auto";

  playBtn.addEventListener("click", () => {
    checkAudio.currentTime = 0;
    checkAudio.play().catch(() => {
      feedback.style.color = "var(--red)";
      feedback.textContent = "Could not play the audio check clip.";
    });
    playBtn.innerHTML = "&#9654;&nbsp; Play Again";
  });

  screen.querySelectorAll(".btn-option").forEach(btn => {
    btn.addEventListener("click", () => {
      const answer = btn.dataset.answer;
      if (answer === AUDIO_CHECK.correct) {
        checkAudio.pause();
        showPracticeIntro();
      } else {
        feedback.style.color = "var(--red)";
        feedback.textContent = "Not quite — listen to the clip again and try again.";
      }
    });
  });
}

function showPracticeIntro() {
  screen.innerHTML = `
    <h1>Practice</h1>
    <p class="lead">You will now do <strong>${PRACTICE_TRIALS.length} practice rounds</strong> to get familiar with the task. They work exactly like the real trials: two clips play once each, then you answer the question.</p>
    <p class="sub">Practice responses are not recorded.</p>
    <br>
    <button class="btn-primary" id="practiceBtn">Start Practice</button>
  `;
  document.getElementById("practiceBtn").addEventListener("click", showPractice);
}

function showPractice() {
  const t = PRACTICE_TRIALS[practiceIndex];
  const next = practiceIndex + 1 < PRACTICE_TRIALS.length ? PRACTICE_TRIALS[practiceIndex + 1] : TRIALS[0];
  runTrial(t, `Practice ${practiceIndex + 1} of ${PRACTICE_TRIALS.length}`,
           (practiceIndex / PRACTICE_TRIALS.length) * 100, next, () => {
    practiceIndex++;
    if (practiceIndex < PRACTICE_TRIALS.length) {
      showPractice();
    } else {
      showPracticeDone();
    }
  });
}

function showPracticeDone() {
  screen.innerHTML = `
    <h1>Practice complete</h1>
    <p class="lead">Great — the main experiment will now begin. There are ${TRIALS.length} trials.</p>
    <br>
    <button class="btn-primary" id="mainBtn">Begin Main Experiment</button>
  `;
  document.getElementById("mainBtn").addEventListener("click", showTrial);
}

function showTrial() {
  const t = TRIALS[trialIndex];
  const next = trialIndex + 1 < TRIALS.length ? TRIALS[trialIndex + 1] : null;
  runTrial(t, `Trial ${trialIndex + 1} of ${TRIALS.length}`,
           (trialIndex / TRIALS.length) * 100, next, (answer, rtMs) => {
    const row = {
      experiment: CONFIG.experimentName,
      participant: participantId,
      session_id: SESSION_ID,
      model: t.model,
      trial: trialIndex + 1,
      condition_id: t.cond.id,
      condition: t.cond.name,
      group: t.item.group,
      timbre: t.item.timbre,
      source: t.item.source,
      audio1: t.audio1.split("/").pop(),
      audio2: t.audio2.split("/").pop(),
      response: answer,
      same_speaker_truth: t.cond.sameSpeakerTruth,
      rt_ms: rtMs
    };
    results.push(row);
    saveTrial(row);
    trialIndex++;
    if (trialIndex < TRIALS.length) {
      /* Simple attention check every 10 trials */
      if (trialIndex % 10 === 0) {
        showAttentionCheck(showTrial);
      } else {
        showTrial();
      }
    } else {
      showDemographics();
    }
  });
}

/* ============================================================
   ATTENTION CHECK — a simple addition problem with a fill-in
   answer, shown every 10 trials. Answers are not recorded.
   ============================================================ */
function showAttentionCheck(next) {
  const a = 1 + Math.floor(Math.random() * 9);   // 1–9
  const b = 1 + Math.floor(Math.random() * 20);  // 1–20
  screen.innerHTML = `
    <h1>Quick Check</h1>
    <p class="lead">Please answer the following question.</p>
    <div class="question">What is ${a} + ${b}?</div>
    <input type="text" id="attnAnswer" inputmode="numeric" autocomplete="off" placeholder="Enter your answer">
    <div class="check-feedback" id="attnFeedback" style="color: var(--red);"></div>
    <button class="btn-primary" id="attnBtn">Continue</button>
  `;
  const input = document.getElementById("attnAnswer");
  const feedback = document.getElementById("attnFeedback");
  input.focus();
  function submit() {
    if (parseInt(input.value.trim(), 10) === a + b) {
      next();
    } else {
      feedback.textContent = "That is not correct — please try again.";
      input.value = "";
      input.focus();
    }
  }
  document.getElementById("attnBtn").addEventListener("click", submit);
  input.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
}

/* Renders one two-clip trial screen. Calls onAnswer(answer, rtMs) after a
   response; preloadTrial's audio is fetched in the background. */
function runTrial(t, label, pct, preloadTrial, onAnswer) {
  screen.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">${label}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="status-line" id="statusLine">Press play when you are ready. The clips play only once.</div>
    <div class="clips">
      <div class="clip" id="clip1">
        <div class="icon">&#127911;</div>
        <div class="name">Clip 1</div>
        <div class="state" id="state1">waiting</div>
      </div>
      <div class="clip" id="clip2">
        <div class="icon">&#127911;</div>
        <div class="name">Clip 2</div>
        <div class="state" id="state2">waiting</div>
      </div>
    </div>
    <button class="btn-primary" id="playBtn">&#9654;&nbsp; Play Clips</button>
    <!-- TESTING ONLY: remove before launch -->
    <div><button id="skipBtn" style="margin-top:14px; background:none; border:1px dashed var(--border); color:var(--muted); font-size:0.8rem; font-weight:500; padding:6px 14px;">skip (testing)</button></div>
    <div id="qa" class="fade hidden-soft" style="margin-top:34px;">
      <div class="question">${CONFIG.question}</div>
      <div class="answers">
        <button class="btn-yes" id="yesBtn" disabled>${CONFIG.yesLabel}</button>
        <button class="btn-no" id="noBtn" disabled>${CONFIG.noLabel}</button>
      </div>
    </div>
  `;

  const playBtn = document.getElementById("playBtn");
  const clip1El = document.getElementById("clip1");
  const clip2El = document.getElementById("clip2");
  const state1 = document.getElementById("state1");
  const state2 = document.getElementById("state2");
  const statusLine = document.getElementById("statusLine");
  const qa = document.getElementById("qa");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");

  /* One media element plays both clips. Playing clip 1 inside the button's
     tap gesture activates the element, so mobile browsers (iOS Safari in
     particular) then allow the programmatic src-swap + play() for clip 2.
     This replaces the old muted-play "unlock" hack, whose deferred
     pause/rewind could fire late on phones and cut clip 2 short. */
  const player = new Audio();
  player.preload = "auto";
  player.src = t.audio1;
  player.load();
  /* Warm the browser cache for clip 2 so the src swap starts instantly. */
  const clip2Prefetch = new Audio();
  clip2Prefetch.preload = "auto";
  clip2Prefetch.src = t.audio2;
  clip2Prefetch.load();
  let questionShownAt = null;

  function reportAudioProblem(src) {
    statusLine.textContent =
      `Could not play "${src.split("/").pop()}". Check that the ` +
      `analysis_files/sentence_extracts/all_files_normalized folder is present next to ` +
      `the experiment folder.`;
    statusLine.style.color = "var(--red)";
  }

  function showQuestion() {
    qa.classList.remove("hidden-soft");
    yesBtn.disabled = false;
    noBtn.disabled = false;
    questionShownAt = performance.now();
  }

  function playSecond() {
    clip2El.classList.add("playing");
    state2.textContent = "playing…";
    player.onended = () => {
      clip2El.classList.remove("playing");
      clip2El.classList.add("done");
      state2.textContent = "played";
      statusLine.textContent = "";
      showQuestion();
    };
    player.onerror = () => {
      clip2El.classList.add("done");
      state2.textContent = "audio error";
      reportAudioProblem(t.audio2);
      showQuestion();
    };
    player.src = t.audio2;
    player.load();
    player.play().catch(() => {
      state2.textContent = "audio error";
      reportAudioProblem(t.audio2);
      showQuestion();
    });
  }

  playBtn.addEventListener("click", () => {
    playBtn.disabled = true;
    playBtn.style.visibility = "hidden";
    statusLine.textContent = "Listen carefully — the clips play only once.";
    clip1El.classList.add("playing");
    state1.textContent = "playing…";
    player.onended = () => {
      clip1El.classList.remove("playing");
      clip1El.classList.add("done");
      state1.textContent = "played";
      setTimeout(playSecond, 600);
    };
    player.onerror = () => {
      clip1El.classList.add("done");
      state1.textContent = "audio error";
      reportAudioProblem(t.audio1);
      setTimeout(playSecond, 600);
    };
    player.play().catch(() => {
      state1.textContent = "audio error";
      reportAudioProblem(t.audio1);
      setTimeout(playSecond, 600);
    });
  });

  function respond(answer) {
    yesBtn.disabled = true;
    noBtn.disabled = true;
    onAnswer(answer, Math.round(performance.now() - questionShownAt));
  }

  yesBtn.addEventListener("click", () => respond("yes"));
  noBtn.addEventListener("click", () => respond("no"));

  /* TESTING ONLY: skip this trial immediately. Stops any playing audio and
     answers "skipped" (rows land in the sheet marked as such). Remove the
     button above and this handler before launch. */
  document.getElementById("skipBtn").addEventListener("click", () => {
    player.onended = player.onerror = null;
    player.pause();
    if (questionShownAt === null) questionShownAt = performance.now();
    respond("skipped");
  });

  /* Preload the upcoming trial's audio while this one runs */
  if (preloadTrial) {
    [preloadTrial.audio1, preloadTrial.audio2].forEach(url => {
      const a = new Audio();
      a.preload = "auto";
      a.src = url;
      a.load();
    });
  }
}

/* ============================================================
   DEMOGRAPHICS — identical questions to the TTS_perception
   experiment. Asked once after the last trial; saved as a single
   row with trial = "demographics".
   ============================================================ */
function showDemographics() {
  let html = `<h1>Please answer the following questions about yourself</h1><div id="demoQuestions" style="margin-bottom:22px;">`;

  html += `<div class="demo-block"><p>Please select your age range.</p>`;
  ["18–24","25–34","35–44","45–54","55+"].forEach(opt => { html += `<label><input type="radio" name="age" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>Which race/ethnicity do you most strongly identify with?</p>`;
  ["Asian American","Black American","Hispanic/Latino American","White American","Native American or other Indigenous culture","Other"].forEach(opt => { html += `<label><input type="checkbox" name="ethnicity" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>What regional dialect do you believe is closest to the way you speak?</p>`;
  ["Midwestern U.S.","Northeastern U.S.","Northwestern U.S.","Southeastern U.S.","Southwestern U.S."].forEach(opt => { html += `<label><input type="radio" name="dialect" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>What is/are your first language(s)?</p>`;
  ["English","English and another language"].forEach(opt => { html += `<label><input type="radio" name="firstlang" value="${opt}"> ${opt}</label>`; });
  html += `<div id="otherLangBox" class="hidden"><p>Please enter the language(s) besides English that you grew up speaking:</p><textarea id="otherLangText"></textarea></div></div>`;

  html += `<div class="demo-block"><p>What is your gender?</p>`;
  ["Male","Female","Non-binary","Other"].forEach(opt => { html += `<label><input type="radio" name="gender" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>Do you have any speech or hearing disorders?</p>`;
  ["No","Yes","Prefer not to say"].forEach(opt => { html += `<label><input type="radio" name="speech" value="${opt}"> ${opt}</label>`; });
  html += `<div id="speechDescBox" class="hidden"><p>Please briefly describe the speech or hearing disorder:</p><textarea id="speechDescText"></textarea></div></div>`;

  html += `<div class="demo-block"><p>Have you been diagnosed as neurodivergent by a medical professional?</p>`;
  ["No","Yes","Prefer not to say"].forEach(opt => { html += `<label><input type="radio" name="neuro" value="${opt}"> ${opt}</label>`; });
  html += `<div id="neuroDescBox" class="hidden"><p>Please briefly state what kind of neurodivergence you have been diagnosed with:</p><textarea id="neuroDescText"></textarea></div></div>`;

  html += `<div class="demo-block"><p>Which technologies do you use regularly?</p>`;
  ["ChatGPT Voice Assistant","Google Gemini Voice","Amazon Alexa","Apple Siri","Microsoft Cortana","Voice-based navigation apps","Other text-to-speech software","None of the above"].forEach(opt => { html += `<label><input type="checkbox" name="tech" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>How often do you use AI-based software or AI voice assistants?</p>`;
  ["Never","Less than once per week","A few times per week","About once per day","Several times per day"].forEach(opt => { html += `<label><input type="radio" name="aiuse" value="${opt}"> ${opt}</label>`; });
  html += `</div>`;

  html += `<div class="demo-block"><p>What is your attitude towards AI-based software or AI voice assistants?</p>`;
  for (let v = 1; v <= 7; v++) {
    let label = "";
    if (v === 1) label = "Very negative";
    if (v === 4) label = "Neutral";
    if (v === 7) label = "Very positive";
    html += `<label><input type="radio" name="aiatt" value="${v}"> ${v} ${label}</label>`;
  }
  html += `</div>`;

  html += `</div><button class="btn-primary" id="demoNextBtn" disabled>Submit</button>`;
  screen.innerHTML = html;

  const btn = document.getElementById("demoNextBtn");

  /* Show a follow-up textarea only when the triggering option is selected. */
  function toggleConditional(name, val, box) {
    document.querySelectorAll(`input[name="${name}"]`).forEach(inp => {
      inp.addEventListener("change", () => {
        const boxEl = document.getElementById(box);
        const checkedVal = (document.querySelector(`input[name="${name}"]:checked`) || {}).value || "";
        if (checkedVal === val) { boxEl.classList.remove("hidden"); }
        else { boxEl.classList.add("hidden"); const ta = boxEl.querySelector("textarea"); if (ta) ta.value = ""; }
        updateBtn();
      });
    });
  }
  toggleConditional("firstlang", "English and another language", "otherLangBox");
  toggleConditional("speech", "Yes", "speechDescBox");
  toggleConditional("neuro", "Yes", "neuroDescBox");

  function allDemoAnswered() {
    const age = document.querySelector('input[name="age"]:checked');
    const eth = document.querySelectorAll('input[name="ethnicity"]:checked').length > 0;
    const dialect = document.querySelector('input[name="dialect"]:checked');
    const gender = document.querySelector('input[name="gender"]:checked');
    const first = document.querySelector('input[name="firstlang"]:checked');
    const speech = document.querySelector('input[name="speech"]:checked');
    const neuro = document.querySelector('input[name="neuro"]:checked');
    const tech = document.querySelectorAll('input[name="tech"]:checked').length > 0;
    const aiuse = document.querySelector('input[name="aiuse"]:checked');
    const aiatt = document.querySelector('input[name="aiatt"]:checked');
    if (!age || !eth || !dialect || !gender || !first || !speech || !neuro || !tech || !aiuse || !aiatt) return false;
    if (first.value === "English and another language" && !document.getElementById("otherLangText").value.trim()) return false;
    if (speech.value === "Yes" && !document.getElementById("speechDescText").value.trim()) return false;
    if (neuro.value === "Yes" && !document.getElementById("neuroDescText").value.trim()) return false;
    return true;
  }
  function updateBtn() { btn.disabled = !allDemoAnswered(); }
  document.querySelectorAll("#demoQuestions input, #demoQuestions textarea").forEach(el => {
    el.addEventListener("input", updateBtn);
    el.addEventListener("change", updateBtn);
  });

  btn.addEventListener("click", () => {
    if (!allDemoAnswered()) return;
    const getRadio = name => (document.querySelector(`input[name="${name}"]:checked`) || {}).value || "";
    const getChecks = name => Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(i => i.value).join("; ");
    const first = getRadio("firstlang");
    const speech = getRadio("speech");
    const neuro = getRadio("neuro");
    const row = {
      experiment: CONFIG.experimentName,
      participant: participantId,
      session_id: SESSION_ID,
      model: MODEL,
      trial: "demographics",
      age: getRadio("age"),
      ethnicity: getChecks("ethnicity"),
      dialect: getRadio("dialect"),
      first_language: first,
      other_languages: first === "English and another language" ? (document.getElementById("otherLangText").value || "") : "",
      gender: getRadio("gender"),
      speech_disorder: speech,
      speech_disorder_desc: speech === "Yes" ? (document.getElementById("speechDescText").value || "") : "",
      neurodivergent: neuro,
      neurodivergent_desc: neuro === "Yes" ? (document.getElementById("neuroDescText").value || "") : "",
      technologies_used: getChecks("tech"),
      ai_use_frequency: getRadio("aiuse"),
      ai_attitude: getRadio("aiatt")
    };
    btn.disabled = true;
    /* Feedback is appended to this row and the whole thing is sent on the
       feedback screen's submit. */
    showFeedback(row);
  });
}

/* Optional written feedback; sent together with the demographics row
   (final_feedback column). */
function showFeedback(demoRow) {
  screen.innerHTML = `
    <h1>Final Feedback</h1>
    <p class="lead">Do you have any comments about the experiment? (optional)</p>
    <div class="demo-block" style="border:none; padding:0;">
      <textarea id="feedbackText" style="min-height:120px;" placeholder="Type any feedback here…"></textarea>
    </div>
    <button class="btn-primary" id="feedbackBtn" style="margin-top:18px;">Submit</button>
  `;
  document.getElementById("feedbackBtn").addEventListener("click", () => {
    demoRow.final_feedback = document.getElementById("feedbackText").value.trim();
    document.getElementById("feedbackBtn").disabled = true;
    saveTrial(demoRow);
    showEnd();
  });
}

function showEnd() {
  screen.innerHTML = `
    <h1>All done &#127881;</h1>
    <p class="lead">Thank you for participating! Your responses have been recorded.</p>
    <p class="footer-note">Model assigned this session: ${MODEL} &middot; ${results.length} trials completed</p>
  `;
  console.log("results", results);
}

showWelcome();
</script>
